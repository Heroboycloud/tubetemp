<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeTemp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .hero-section {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: white;
            padding: 80px 0;
            border-radius: 0 0 50px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .hero-title {
            font-weight: 800;
            font-size: 3.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .search-box input {
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            border-radius: 50px 0 0 50px;
        }
        
        .search-box input:focus {
            box-shadow: none;
            border-color: transparent;
        }
        
        .search-box button {
            border-radius: 50px;
            padding: 15px 40px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border: none;
        }
        
        .search-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease;
        }
        
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .sentiment-badge {
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.2rem;
        }
        
        .stat-card {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: scale(1.05);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .comment-item {
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .comment-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .comment-author {
            font-weight: 600;
            color: #333;
        }
        
        .sentiment-tag {
            font-size: 0.8rem;
            padding: 3px 12px;
            border-radius: 50px;
            font-weight: 600;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 50px 0;
        }
        
        .loading-spinner .spinner-border {
            width: 4rem;
            height: 4rem;
        }
        
        .mood-display {
            font-size: 4rem;
            text-align: center;
            padding: 20px;
        }
        
        .progress-custom {
            height: 30px;
            border-radius: 15px;
            margin: 5px 0;
        }
        
        .progress-custom .progress-bar {
            font-weight: 600;
            line-height: 30px;
        }
        
        #results {
            display: none;
        }
        
        .error-message {
            display: none;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .footer {
            background: #2d3436;
            color: white;
            padding: 30px 0;
            margin-top: 50px;
            border-radius: 50px 50px 0 0;
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <div class="hero-section text-center">
        <div class="container">
            <h1 class="hero-title">
                <i class="bi bi-youtube text-danger"></i> 
                TubeTemp
            </h1>
            <p class="lead mt-3">Analyze viewer sentiment from any YouTube video in seconds!</p>
            
            <!-- Search Form -->
            <div class="row justify-content-center mt-5">
                <div class="col-lg-8">
                    <form id="analyzeForm">
                        <div class="search-box d-flex">
                            <input type="text" class="form-control" id="videoUrl" 
                                   placeholder="Paste YouTube URL here..." 
                                   value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
                            <button type="submit" class="btn btn-primary" id="analyzeBtn">
                                <i class="bi bi-bar-chart-fill"></i> Analyze
                            </button>
                        </div>
                    </form>
                    <div class="text-start mt-3 text-white-50">
                        <i class="bi bi-info-circle"></i> Works with: youtube.com/watch?v=... or youtu.be/...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h5 class="mt-3 text-secondary">Analyzing comments... This may take a moment</h5>
        <p class="text-muted">Fetching up to 500 comments</p>
    </div>

    <!-- Error Message -->
    <div class="container mt-4">
        <div class="alert alert-danger error-message" id="errorMessage" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i> 
            <span id="errorText">Error message here</span>
        </div>
    </div>

    <!-- Results Section -->
    <div class="container" id="results">
        <div class="result-card" id="resultContent">
            <!-- Will be filled by JavaScript -->
        </div>
    </div>

    <!-- Footer -->
    <div class="footer text-center">
        <div class="container">
            <p class="mb-0">
                <i class="bi bi-robot"></i> Powered by YouTube API & Sentiment Analysis
                <br>
                <small class="text-muted">© 2026 TubeTemp</small>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById('analyzeForm');
        const videoUrlInput = document.getElementById('videoUrl');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resultsDiv = document.getElementById('results');
        const resultContent = document.getElementById('resultContent');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const videoUrl = videoUrlInput.value.trim();
            if (!videoUrl) {
                showError('Please enter a YouTube URL');
                return;
            }

            // Hide previous results and error
            resultsDiv.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Show loading
            loadingSpinner.style.display = 'block';
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Analyzing...';

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ videoUrl })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Something went wrong');
                }

                if (!data.success) {
                    throw new Error(data.error || 'Analysis failed');
                }

                // Display results
                displayResults(data);
                resultsDiv.style.display = 'block';
                resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                showError(error.message);
            } finally {
                loadingSpinner.style.display = 'none';
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<i class="bi bi-bar-chart-fill"></i> Analyze';
            }
        });

        function displayResults(data) {
            const { analysis, videoId } = data;
            
            let html = `
                <div class="text-center mb-4">
                    <div class="mood-display">${analysis.moodEmoji}</div>
                    <h2 class="fw-bold">Viewers are <span style="color: ${analysis.moodColor}">${analysis.overallMood}</span>!</h2>
                    <p class="text-muted">Based on ${analysis.totalComments} comments analyzed</p>
                    <a href="https://youtube.com/watch?v=${videoId}" target="_blank" class="text-decoration-none">
                        <i class="bi bi-youtube text-danger"></i> Watch Video
                    </a>
                </div>

                <!-- Statistics Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="stat-number text-success">${analysis.positivePercentage}%</div>
                            <div class="text-muted">Positive</div>
                            <div class="badge bg-success">${analysis.positiveCount} comments</div>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="stat-number text-danger">${analysis.negativePercentage}%</div>
                            <div class="text-muted">Negative</div>
                            <div class="badge bg-danger">${analysis.negativeCount} comments</div>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="stat-number text-secondary">${analysis.neutralPercentage}%</div>
                            <div class="text-muted">Neutral</div>
                            <div class="badge bg-secondary">${analysis.neutralCount} comments</div>
                        </div>
                    </div>
                    <div class="col-md-3 col-6">
                        <div class="stat-card">
                            <div class="stat-number text-primary">${analysis.averageScore.toFixed(2)}</div>
                            <div class="text-muted">Avg Sentiment Score</div>
                            <div class="badge bg-primary">-5 to +5 scale</div>
                        </div>
                    </div>
                </div>

                <!-- Progress Bars -->
                <div class="mb-4">
                    <div class="progress progress-custom">
                        <div class="progress-bar bg-success" style="width: ${analysis.positivePercentage}%">
                            👍 ${analysis.positivePercentage}%
                        </div>
                        <div class="progress-bar bg-secondary" style="width: ${analysis.neutralPercentage}%">
                            😐 ${analysis.neutralPercentage}%
                        </div>
                        <div class="progress-bar bg-danger" style="width: ${analysis.negativePercentage}%">
                            👎 ${analysis.negativePercentage}%
                        </div>
                    </div>
                </div>

                <!-- Top Comments -->
                <h4 class="mt-5 mb-3">
                    <i class="bi bi-chat-dots"></i> Top Comments
                    <small class="text-muted fs-6">(Showing ${analysis.comments.length} of ${analysis.totalComments})</small>
                </h4>
                <div class="comment-list">
            `;

            analysis.comments.forEach(comment => {
                const sentimentColor = comment.sentiment === 'positive' ? 'success' :
                                     comment.sentiment === 'negative' ? 'danger' : 'secondary';
                const sentimentIcon = comment.sentiment === 'positive' ? '😊' :
                                     comment.sentiment === 'negative' ? '😟' : '😐';
                
                html += `
                    <div class="comment-item">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="comment-author">${comment.author}</span>
                                <span class="ms-2 text-muted small">❤️ ${comment.likes}</span>
                                <p class="mt-1 mb-0">${comment.text}</p>
                            </div>
                            <div>
                                <span class="sentiment-tag bg-${sentimentColor} text-white">
                                    ${sentimentIcon} ${comment.sentiment} (${comment.sentimentScore})
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                </div>
                <div class="text-center mt-3">
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i> Sentiment Score: Positive &gt; 0, Negative &lt; 0, Neutral = 0
                    </small>
                </div>
            `;

            resultContent.innerHTML = html;
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'block';
            resultsDiv.style.display = 'none';
            errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Add example video on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Auto-analyze the example video? Uncomment below:
            // form.dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
